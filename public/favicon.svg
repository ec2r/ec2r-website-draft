<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 10 38 38" fill="none">
  <!-- EC²R favicon — icône batterie + éclair (aligné sur logo-ec2r.svg) -->
  <!-- Battery outline -->
  <rect x="8" y="18" width="28" height="24" rx="3" stroke="#002060" stroke-width="2" fill="#FFFFFF"/>
  <!-- Battery tip -->
  <rect x="36" y="25" width="3" height="10" rx="1.5" fill="#002060"/>

  <!-- Energy segments (gradient rouge → vert) -->
  <rect x="11" y="21" width="5" height="18" rx="1" fill="#DC2626"/>
  <rect x="17" y="21" width="5" height="18" rx="1" fill="#EAB308"/>
  <rect x="23" y="21" width="5" height="18" rx="1" fill="#C9A56E"/>
  <rect x="29" y="21" width="5" height="18" rx="1" fill="#22C55E"/>

  <!-- Lightning bolt jaune sur la batterie -->
  <path d="M22 14 L19 23 L23 23 L20 32 L25 23 L21 23 L24 14 Z" fill="#EAB308" stroke="#002060" stroke-width="0.5"/>
</svg>
