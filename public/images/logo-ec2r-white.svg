<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Battery icon with energy gradient -->
  <g id="battery-icon">
    <!-- Battery outline -->
    <rect x="8" y="18" width="28" height="24" rx="3" stroke="white" stroke-width="2" fill="none"/>
    <!-- Battery tip -->
    <rect x="36" y="25" width="3" height="10" rx="1.5" fill="white"/>
    
    <!-- Energy segments (gradient from red to green) -->
    <rect x="11" y="21" width="5" height="18" rx="1" fill="#DC2626" opacity="0.9"/>
    <rect x="17" y="21" width="5" height="18" rx="1" fill="#EAB308" opacity="0.9"/>
    <rect x="23" y="21" width="5" height="18" rx="1" fill="#C9A56E" opacity="0.9"/>
    <rect x="29" y="21" width="5" height="18" rx="1" fill="#22C55E" opacity="0.9"/>
    
    <!-- Lightning bolt accent -->
    <path d="M22 14 L19 23 L23 23 L20 32 L25 23 L21 23 L24 14 Z" fill="#EAB308" stroke="white" stroke-width="0.5" opacity="0.9"/>
  </g>
  
  <!-- EC²R Text -->
  <g id="text" transform="translate(50, 0)">
    <text x="0" y="40" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="-0.5">EC<tspan baseline-shift="super" font-size="20" dx="-2">2</tspan><tspan dx="-3">R</tspan></text>
  </g>
</svg>
