<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Battery icon with energy gradient -->
  <g id="battery-icon">
    <!-- Battery outline -->
    <rect x="8" y="18" width="28" height="24" rx="3" stroke="#002060" stroke-width="2" fill="none"/>
    <!-- Battery tip -->
    <rect x="36" y="25" width="3" height="10" rx="1.5" fill="#002060"/>
    
    <!-- Energy segments (gradient from red to green) -->
    <rect x="11" y="21" width="5" height="18" rx="1" fill="#DC2626"/>
    <rect x="17" y="21" width="5" height="18" rx="1" fill="#EAB308"/>
    <rect x="23" y="21" width="5" height="18" rx="1" fill="#C9A56E"/>
    <rect x="29" y="21" width="5" height="18" rx="1" fill="#22C55E"/>
    
    <!-- Lightning bolt — signe d'énergie doré -->
    <path d="M 24 19 L 14 32 L 21 32 L 18 41 L 30 27 L 23 27 L 26 19 Z" fill="#C9A56E" stroke="#002060" stroke-width="0.6" stroke-linejoin="round"/>
  </g>
  
  <!-- EC²R Text -->
  <g id="text" transform="translate(50, 0)">
    <text x="0" y="40" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="36" font-weight="800" fill="#002060" letter-spacing="-0.5">EC<tspan baseline-shift="super" font-size="20" dx="-2">2</tspan><tspan dx="-3">R</tspan></text>
  </g>
</svg>
